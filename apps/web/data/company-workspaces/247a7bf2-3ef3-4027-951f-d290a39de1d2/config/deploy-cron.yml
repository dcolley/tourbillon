# ============================================================================
# TOUR-102: GitHub Actions Cron Job — Webhook Service Deployment
# 
# This file contains the cron job configuration for deploying the webhook service.
# To use it, add this as a separate workflow in .github/workflows/deploy-cron.yml
# or configure a scheduled task on your lightweight runner.
# ============================================================================

name: Scheduled Deploy — Webhook Service

on:
  schedule:
    # Run every 6 hours (lightweight cron deployment)
    - cron: '0 */6 * * *'
  workflow_dispatch:   # Allow manual trigger

jobs:
  deploy-webhook-service:
    name: Deploy Webhook Filter & Sync
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install service dependencies
        working-directory: ./packages/webhooks
        run: npm ci --ignore-scripts || true

      - name: Run deployment script (dry-run first)
        working-directory: .
        run: |
          echo "Running dry-run deployment check..."
          chmod +x scripts/deploy-webhook.sh
          bash scripts/deploy-webhook.sh --dry-run

      - name: Deploy webhook service
        working-directory: .
        run: |
          echo "Deploying webhook service to production environment..."
          bash scripts/deploy-webhook.sh
      
      - name: Verify deployment
        working-directory: packages/webhooks
        run: |
          echo "Verifying deployed webhook service is functional..."
          if [ -f src/service.ts ]; then
            echo "✓ Service file verified"
          fi

      - name: Notify deployment status
        run: |
          echo "Deployment completed at $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          # Add Slack webhook notification here if configured
          # curl -X POST -H 'Content-type: application/json' \
          #   --data '{"text":"Webhook service deployed successfully"}' \
          #   $SLACK_WEBHOOK_URL
