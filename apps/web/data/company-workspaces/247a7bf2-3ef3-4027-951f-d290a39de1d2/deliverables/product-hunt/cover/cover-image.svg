<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tourbillon - Product Hunt Launch</title>
<style>@import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&display=swap');</style>
</head>
<body style="margin:0;padding:0;background:#0a0f1e;font-family:'Inter',sans-serif;">

<!-- COVER IMAGE (1200x630) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bgGrad" cx="75%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#1e1b4b"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bgGrad)"/>
  
  <!-- Decorative circles (subtle glow effects) -->
  <circle cx="950" cy="250" r="180" fill="#6366f120" filter="url(#glow)"/>
  <circle cx="850" cy="300" r="140" fill="#6366f130"/>
  
  <!-- Border frame -->
  <rect x="45" y="45" width="1110" height="540" rx="15" ry="15" 
        fill="none" stroke="#6366f1" stroke-width="2" opacity="0.5"/>
  
  <!-- Top tag -->
  <rect x="500" y="70" width="200" height="36" rx="18" fill="#6366f1"/>
  <text x="600" y="94" text-anchor="middle" font-size="16" font-weight="700" fill="white">PH LAUNCHING NOW</text>
  
  <!-- Subtitle -->
  <text x="600" y="180" text-anchor="middle" font-size="22" font-weight="400" fill="#a5b4fc" letter-spacing="3">MULTI-AGENT ORCHESTRATION PLATFORM</text>
  
  <!-- Main title -->
  <text x="600" y="310" text-anchor="middle" font-size="80" font-weight="900" fill="#ffffff" letter-spacing="-2">Tourbillon</text>
  
  <!-- Tagline -->
  <text x="600" y="390" text-anchor="middle" font-size="28" font-weight="400" fill="#c7d2fe">Build · Orchestrate · Deploy — Zero Code Required</text>
  
  <!-- Bottom CTA -->
  <rect x="500" y="460" width="200" height="50" rx="25" fill="#6366f1"/>
  <text x="600" y="492" text-anchor="middle" font-size="18" font-weight="600" fill="white">Upvote on Product Hunt</text>
  
  <!-- Decorative dots -->
  <circle cx="120" cy="100" r="3" fill="#6366f140"/>
  <circle cx="150" cy="80" r="2" fill="#6366f130"/>
  <circle cx="1000" cy="550" r="3" fill="#6366f140"/>
  <circle cx="1070" cy="530" r="2" fill="#6366f130"/>
</svg>

</body>
</html>
