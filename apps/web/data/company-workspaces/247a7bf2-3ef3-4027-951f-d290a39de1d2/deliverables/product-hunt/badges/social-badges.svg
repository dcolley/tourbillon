<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><title>Tourbillon Social Badges</title></head>
<body style="margin:0;">

<!-- TWITTER/X BADGE (1200x675) -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" width="1200" height="675">
  <defs>
    <linearGradient id="twGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e293b"/>
      <stop offset="100%" stop-color="#0a0f1e"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="675" fill="url(#twGrad)"/>
  
  <!-- Product Hunt logo placeholder -->
  <circle cx="600" cy="280" r="80" fill="#da552f"/>
  <text x="600" y="290" text-anchor="middle" font-family="'Inter',sans-serif" font-size="32" font-weight="900" fill="white">PH</text>
  
  <!-- Main message -->
  <text x="600" y="430" text-anchor="middle" font-family="'Inter',sans-serif" font-size="52" font-weight="900" fill="#ffffff">Upvote Tourbillon on Product Hunt!</text>
  
  <!-- Subtitle -->
  <text x="600" y="500" text-anchor="middle" font-family="'Inter',sans-serif" font-size="24" fill="#a5b4fc">Multi-Agent Orchestration Platform — Build, Orchestrate, Deploy</text>
  
  <!-- CTA -->
  <rect x="500" y="540" width="200" height="60" rx="30" fill="#da552f"/>
  <text x="600" y="578" text-anchor="middle" font-family="'Inter',sans-serif" font-size="20" font-weight="700" fill="white">VOTE NOW</text>
  
  <!-- Decorative -->
  <circle cx="100" cy="100" r="60" fill="#6366f1" opacity="0.1"/>
  <circle cx="1100" cy="575" r="40" fill="#6366f1" opacity="0.1"/>
</svg>

