version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: tourbillon
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data

  # # Optional: local web search (open-source, no API key needed)
  # searxng:
  #   image: searxng/searxng:latest
  #   ports:
  #     - '8888:8080'
  #   environment:
  #     SEARXNG_SECRET: changeme-in-production
  #   volumes:
  #     - ./docker/searxng:/etc/searxng

volumes:
  postgres_data:
  redis_data:
